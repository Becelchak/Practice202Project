global:
  resolve_timeout: 5m
  smtp_smarthost: 'smtp.yandex.ru:465'
  smtp_from: 'alertmanager@yourdomain.ru'
  smtp_auth_username: 'RomanZykov23@yandex.ru'
  smtp_auth_password: '#.%SG+xw-LPR)%6'   # App Password, не основной пароль!
  smtp_require_tls: true

route:
  receiver: 'email-default'
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - match:
        severity: critical
      receiver: 'email-critical'
      continue: true
    - match:
        severity: warning
      receiver: 'email-warning'

receivers:
  - name: 'email-default'
    email_configs:
      - to: 'team@yourdomain.ru'
        send_resolved: true
        headers:
          Subject: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
        html: |
          <h2>{{ .CommonLabels.alertname }}</h2>
          <p><strong>Status:</strong> {{ .Status }}</p>
          <p><strong>Severity:</strong> {{ .CommonLabels.severity }}</p>
          <p>{{ .CommonAnnotations.description }}</p>

  - name: 'email-critical'
    email_configs:
      - to: 'oncall@yourdomain.ru'
        send_resolved: true
        html: |
          <h2 style="color: red;">🚨 CRITICAL: {{ .CommonLabels.alertname }}</h2>
          <p>{{ .CommonAnnotations.description }}</p>

  - name: 'email-warning'
    email_configs:
      - to: 'team@yourdomain.ru'
        send_resolved: true
        html: |
          <h2 style="color: orange;">⚠️ WARNING: {{ .CommonLabels.alertname }}</h2>
          <p>{{ .CommonAnnotations.description }}</p>
