name: CI Pipeline (C#)

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 9.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v3
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore **/VrKayak.Backend/VrKayak.Backend.csproj

      - name: Build solution
        run: dotnet build **/VrKayak.Backend/VrKayak.Backend.csproj --no-restore --configuration Release

      - name: Run tests
        run: dotnet test **/VrKayak.Backend/VrKayak.Backend.csproj --no-build --configuration Release --verbosity normal

      - name: Lint with dotnet format
        run: dotnet format **/VrKayak.Backend/VrKayak.Backend.csproj --verify-no-changes --severity warn

      - name: Security scan (SCA)
        run: |
          dotnet list scr/VrKayak.Backend/VrKayak.Backend.csproj package --vulnerable --include-transitive --format json > vuln.json
          CRITICAL=$(jq '.projects[].frameworks[].topLevelPackages[]?.vulnerabilities[]?.severity' vuln.json | grep -c "Critical" || true)
          if [ "$CRITICAL" -gt 0 ]; then
            echo "❌ Found $CRITICAL critical vulnerabilities!" && exit 1
          else
            echo "✅ No critical vulnerabilities"
          fi
        continue-on-error: false
  docker-build-push:
    runs-on: ubuntu-latest
    needs: [build-and-test]
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./artifacts/Dockerfile
          push: true
          tags: ghcr.io/becelchak/vrkayak-backend-ci:latest
          cache-from: type=registry,ref=ghcr.io/becelchak/vrkayak-backend-ci:cache
          cache-to: type=registry,ref=ghcr.io/becelchak/vrkayak-backend-ci:cache,mode=max
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dotnet-version: ['8.0.x', '9.0.x']
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET ${{ matrix.dotnet-version }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}
      - name: Test
        run: dotnet test scr/VrKayak.Backend/VrKayak.Backend.csproj
  security-codeql:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - name: Initialize CodeQL
          uses: github/codeql-action/init@v3
          with:
            languages: csharp
        - name: Autobuild
          uses: github/codeql-action/autobuild@v3
        - name: Perform CodeQL Analysis
          uses: github/codeql-action/analyze@v3
  secret-detection:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: gitleaks.toml
          report-path: artifacts/gitleaks-report.json
          verbose: true
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: artifacts/gitleaks-report.json
  sbom-generation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          path: "."
          format: "cyclonedx-json"
          output-file: "artifacts/sbom.json"
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: artifacts/sbom.json
  image-scan:
    runs-on: ubuntu-latest
    needs: [docker-build-push]
    if: always() && (needs.docker-build-push.result == 'success')
    steps:
      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "ghcr.io/becelchak/vrkayak-backend-ci:latest"
          format: "table"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          output: "trivy-image-report.txt"
      - name: Save JSON report
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "ghcr.io/becelchak/vrkayak-backend-ci:latest"
          format: "json"
          severity: "CRITICAL,HIGH,MEDIUM,LOW"
          output: "artifacts/trivy-image-report.json"
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-report
          path: artifacts/trivy-image-report.json
