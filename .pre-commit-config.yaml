repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict

  - repo: local
    hooks:
      - id: dotnet-format
        name: dotnet format
        entry: dotnet format --verify-no-changes --include
        language: system
        files: \.(cs)$
        pass_filenames: true

  - repo: local
    hooks:
      - id: dotnet-build
        name: dotnet build
        entry: dotnet build --no-restore --verbosity quiet
        language: system
        files: \.(cs|csproj|sln)$
        pass_filenames: false
        always_run: true

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: ^(.*\.(csproj|sln|userprefs)|\.gitignore|\.pre-commit-config\.yaml)$