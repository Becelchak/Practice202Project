name: CI Pipeline (C#)

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 9.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v3
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: List files to debug
        run: find . VrKayak.Backend "*.csproj"

      - name: Restore dependencies
        run: dotnet restore **/VrKayak.Backend/VrKayak.Backend.csproj

      - name: Build solution
        run: dotnet build **/VrKayak.Backend/VrKayak.Backend.csproj --no-restore --configuration Release

      - name: Run tests
        run: dotnet test **/VrKayak.Backend/VrKayak.Backend.csproj --no-build --configuration Release --verbosity normal

      - name: Lint with dotnet format
        run: dotnet format **/VrKayak.Backend/VrKayak.Backend.csproj --verify-no-changes --severity warn

      - name: Security scan (basic)
        run: |
          dotnet list package --vulnerable --include-transitive
        continue-on-error: true
